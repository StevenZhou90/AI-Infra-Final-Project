version: "3.8"

services:
  vla-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: vla-serving
    ports:
      - "${VLA_SERVING_PORT:-50051}:50051"
    environment:
      - VLA_SERVING_PORT=50051
      - VLA_SERVING_KV_CACHE_TARGET=${KV_CACHE_TARGET:-0.90}
      - VLA_SERVING_GPU_IDS=${GPU_IDS:-}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - model-cache:/root/.cache/huggingface
    restart: unless-stopped
    shm_size: "16gb"
    ulimits:
      memlock:
        soft: -1
        hard: -1

volumes:
  model-cache:
    driver: local
