workspace_root: /home/ubuntu/AI-Infra-Final-Project
specvla_repo_path: /home/ubuntu/AI-Infra-Final-Project/external/SpecVLA
output_root: /home/ubuntu/AI-Infra-Final-Project/outputs/libero_specvla_strict
artifacts_root: /home/ubuntu/AI-Infra-Final-Project/artifacts
hf_upload:
  enabled: false
  repo_id: StevenZhou90/ai-infra-final

benchmark:
  suites:
    - libero_goal
    - libero_object
    - libero_spatial
    - libero_10
  tasks_per_suite: 10
  trials_per_task: 50
  num_steps_wait: 10
  seed: 7
  progress_log_seconds: 3600

smoke:
  tasks_per_suite: 2
  trials_per_task: 5

gate:
  speedup_gt: 1.0
  max_success_drop: 0.0

inputs:
  model_family: openvla
  pretrained_checkpoint_by_suite:
    libero_goal: openvla/openvla-7b-finetuned-libero-goal
    libero_object: openvla/openvla-7b-finetuned-libero-object
    libero_spatial: openvla/openvla-7b-finetuned-libero-spatial
    libero_10: openvla/openvla-7b-finetuned-libero-10
  load_in_8bit: false
  load_in_4bit: false
  center_crop: true
  parallel_draft: false
  spec_checkpoint_by_suite:
    libero_goal: /home/ubuntu/AI-Infra-Final-Project/artifacts/specvla_checkpoints/goal
    libero_object: /home/ubuntu/AI-Infra-Final-Project/artifacts/specvla_checkpoints/object
    libero_spatial: /home/ubuntu/AI-Infra-Final-Project/artifacts/specvla_checkpoints/spatial
    libero_10: /home/ubuntu/AI-Infra-Final-Project/artifacts/specvla_checkpoints/libero_10
  accept_threshold_by_suite:
    libero_goal: 0
    libero_object: 0
    libero_spatial: 0
    libero_10: 0
