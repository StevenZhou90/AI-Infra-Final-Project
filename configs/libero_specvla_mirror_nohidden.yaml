specvla_repo_path: /home/ubuntu/AI-Infra-Final-Project/.tmp_specvla
output_root: /home/ubuntu/AI-Infra-Final-Project/outputs/libero_specvla_mirror

benchmark:
  suites:
    - libero_goal
  tasks_per_suite: 10
  trials_per_task: 50
  num_steps_wait: 10
  seed: 7
  progress_log_seconds: 3600

smoke:
  tasks_per_suite: 1
  trials_per_task: 5

gate:
  speedup_gt: 1.0
  max_success_drop: 0.0

inputs:
  model_family: openvla
  pretrained_checkpoint: openvla/openvla-7b-finetuned-libero-goal
  load_in_8bit: false
  load_in_4bit: false
  center_crop: true
  parallel_draft: false
  trajectory_fast_draft_only: true
  trajectory_use_draft_prefill_hidden: false
  trajectory_fast_max_draft_calls: 50
  trajectory_fast_min_confident_tokens_by_suite:
    libero_goal: 5
  trajectory_head_threshold: 0.2
  trajectory_head_top_k: 3
  spec_checkpoint_by_suite:
    libero_goal: /home/ubuntu/AI-Infra-Final-Project/artifacts/checkpoints/libero_goal/libero_r1_fullish_nohidden/best.pt
  accept_threshold_by_suite:
    libero_goal: 9
    libero_object: 9
    libero_spatial: 9
    libero_10: 5
