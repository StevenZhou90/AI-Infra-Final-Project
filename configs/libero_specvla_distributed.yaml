workspace_root: /home/ubuntu/AI-Infra-Final-Project
specvla_repo_path: /home/ubuntu/AI-Infra-Final-Project/.tmp_specvla
output_root: /home/ubuntu/AI-Infra-Final-Project/outputs/libero_specvla_distributed
artifacts_root: /home/ubuntu/AI-Infra-Final-Project/artifacts
hf_upload:
  enabled: false
  repo_id: StevenZhou90/ai-infra-final

benchmark:
  suites:
    - libero_goal
    - libero_object
    - libero_spatial
    - libero_10
  tasks_per_suite: 10
  trials_per_task: 50
  num_steps_wait: 10
  seed: 7
  progress_log_seconds: 3600

smoke:
  tasks_per_suite: 1
  trials_per_task: 5

gate:
  speedup_gt: 1.0
  max_success_drop: 0.0

inputs:
  model_family: openvla
  pretrained_checkpoint: openvla/openvla-7b-finetuned-libero-goal
  load_in_8bit: false
  load_in_4bit: false
  center_crop: true
  parallel_draft: false
  trajectory_decoder_mode: trajectory-two-head-spec
  trajectory_allow_missing_head: true
  trajectory_fast_draft_only: true
  trajectory_use_draft_prefill_hidden: false
  trajectory_retrieval_top_k: 4
  trajectory_retrieval_min_confidence: 0.55
  trajectory_kinematic_threshold: 4.0
  trajectory_smooth_phase_curvature: 6.0
  trajectory_smooth_phase_acceleration: 8.0
  trajectory_smooth_phase_min_displacement: 1.5
  trajectory_relaxed_tolerance: 2.0
  trajectory_hybrid_max_draft_length: 7
  trajectory_fast_min_confident_tokens_by_suite:
    libero_goal: 5
    libero_object: 5
    libero_spatial: 5
    libero_10: 5
  trajectory_head_threshold: 0.2
  trajectory_head_top_k: 3
  spec_checkpoint_by_suite:
    libero_goal: ""
    libero_object: ""
    libero_spatial: ""
    libero_10: ""
  smooth_spec_checkpoint_by_suite:
    libero_goal: /home/ubuntu/AI-Infra-Final-Project/artifacts/checkpoints/libero_goal/two_head_useful_6task_5trial_160/smooth/best.pt
    libero_object: /home/ubuntu/AI-Infra-Final-Project/artifacts/checkpoints/libero_object/two_head_r1/smooth/best.pt
    libero_spatial: /home/ubuntu/AI-Infra-Final-Project/artifacts/checkpoints/libero_spatial/two_head_r1/smooth/best.pt
    libero_10: /home/ubuntu/AI-Infra-Final-Project/artifacts/checkpoints/libero_10/two_head_r1/smooth/best.pt
  complex_spec_checkpoint_by_suite:
    libero_goal: /home/ubuntu/AI-Infra-Final-Project/artifacts/checkpoints/libero_goal/two_head_useful_6task_5trial_160/complex/best.pt
    libero_object: /home/ubuntu/AI-Infra-Final-Project/artifacts/checkpoints/libero_object/two_head_r1/complex/best.pt
    libero_spatial: /home/ubuntu/AI-Infra-Final-Project/artifacts/checkpoints/libero_spatial/two_head_r1/complex/best.pt
    libero_10: /home/ubuntu/AI-Infra-Final-Project/artifacts/checkpoints/libero_10/two_head_r1/complex/best.pt
  accept_threshold_by_suite:
    libero_goal: 9
    libero_object: 9
    libero_spatial: 9
    libero_10: 5

head_training:
  suites:
    - libero_goal
    - libero_object
    - libero_spatial
    - libero_10
  dagger_rounds: 0
  pretrained_by_suite:
    libero_goal: openvla/openvla-7b-finetuned-libero-goal
    libero_object: openvla/openvla-7b-finetuned-libero-object
    libero_spatial: openvla/openvla-7b-finetuned-libero-spatial
    libero_10: openvla/openvla-7b-finetuned-libero-10
  sweep_by_suite:
    libero_goal: mini
    libero_object: mini
    libero_spatial: mini
    libero_10: mini
  command_templates:
    generate_data: >-
      python scripts/generate_libero_trajectory_head_data.py
      --suite {suite}
      --task-ids 0,1,3,5,7,9
      --trials-per-task 1
      --max-steps 80
      --out-dir {artifact_root}/data/{suite}/r{round}
      --pretrained {pretrained}
    train_smooth: >-
      python scripts/train_trajectory_head.py
      --data-dir {artifact_root}/data/{suite}/r{round}
      --out-dir {suite_ckpt_root}/two_head_r{round}/smooth
      --phase-filter smooth
      --epochs 20
      --device cuda
    train_complex: >-
      python scripts/train_trajectory_head.py
      --data-dir {artifact_root}/data/{suite}/r{round}
      --out-dir {suite_ckpt_root}/two_head_r{round}/complex
      --phase-filter complex
      --epochs 20
      --device cuda
    dagger_generate_data: >-
      python scripts/generate_trajectory_head_dagger_data.py
      --policy-head-checkpoint {suite_ckpt_root}/r{prev_round}/best.pt
      --sweep {sweep}
      --out-dir {artifact_root}/data/{suite}/r{round}
      --pretrained {pretrained}
      --device cuda
