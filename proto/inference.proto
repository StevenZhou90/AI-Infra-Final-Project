syntax = "proto3";

package vla_serving;

option python_package = "vla_serving.proto";

// --- Enums ---

enum Priority {
  PRIORITY_LOW = 0;
  PRIORITY_NORMAL = 1;
  PRIORITY_HIGH = 2;
  PRIORITY_CRITICAL = 3;
}

enum Codec {
  CODEC_RAW = 0;
  CODEC_JPEG = 1;
  CODEC_WEBP = 2;
  CODEC_H264 = 3;
  CODEC_H265 = 4;
}

// --- Messages ---

message EncodedFrame {
  bytes data = 1;
  Codec codec = 2;
  uint32 width = 3;
  uint32 height = 4;
  uint32 channels = 5;
  string camera_id = 6;
  uint64 timestamp_ns = 7;
}

message VideoBurst {
  repeated EncodedFrame frames = 1;
  string camera_id = 2;
  uint64 start_timestamp_ns = 3;
  uint64 end_timestamp_ns = 4;
}

message JointState {
  repeated float positions = 1;
  repeated float velocities = 2;
  repeated float efforts = 3;
  uint64 timestamp_ns = 4;
}

message ActionChunk {
  repeated ActionStep steps = 1;
  uint64 start_timestamp_ns = 2;
  float frequency_hz = 3;
  uint32 accepted_length = 4;
  float confidence = 5;
}

message ActionStep {
  repeated float joint_targets = 1;
  repeated float gripper_targets = 2;
}

// --- Inference RPCs ---

message InferRequest {
  string request_id = 1;
  string model_id = 2;
  Priority priority = 3;

  repeated EncodedFrame camera_frames = 4;
  repeated VideoBurst video_bursts = 5;
  JointState joint_state = 6;

  uint32 chunk_size = 7;
  string session_id = 8;
  map<string, string> metadata = 9;
}

message InferResponse {
  string request_id = 1;
  ActionChunk action_chunk = 2;
  bool used_speculative = 3;
  float drafter_acceptance_rate = 4;
  float inference_time_ms = 5;
  float queue_wait_ms = 6;
  string error = 7;
}

// --- Model management RPCs ---

message ModelInfo {
  string model_id = 1;
  string model_name = 2;
  uint64 param_count = 3;
  string precision = 4;
  int32 gpu_id = 5;
  uint64 memory_bytes = 6;
  bool is_loaded = 7;
  string drafter_model_id = 8;
}

message ListModelsRequest {}

message ListModelsResponse {
  repeated ModelInfo models = 1;
}

message LoadModelRequest {
  string model_id = 1;
  string hf_repo = 2;
  string precision = 3;
  int32 target_gpu = 4;
  string drafter_hf_repo = 5;
}

message LoadModelResponse {
  ModelInfo model = 1;
  string error = 2;
}

message UnloadModelRequest {
  string model_id = 1;
}

message UnloadModelResponse {
  bool success = 1;
  string error = 2;
}

// --- Health ---

message HealthRequest {}

message HealthResponse {
  bool healthy = 1;
  uint32 gpu_count = 2;
  repeated GpuStatus gpus = 3;
  uint32 queue_depth = 4;
  uint32 active_models = 5;
}

message GpuStatus {
  int32 gpu_id = 1;
  string gpu_name = 2;
  uint64 total_memory = 3;
  uint64 used_memory = 4;
  uint64 kv_cache_memory = 5;
  float kv_cache_utilization = 6;
  float gpu_utilization = 7;
  uint32 models_loaded = 8;
}

// --- Services ---

service InferenceService {
  rpc Infer(InferRequest) returns (InferResponse);
  rpc StreamInfer(stream InferRequest) returns (stream InferResponse);
}

service ModelService {
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc LoadModel(LoadModelRequest) returns (LoadModelResponse);
  rpc UnloadModel(UnloadModelRequest) returns (UnloadModelResponse);
}

service HealthService {
  rpc Check(HealthRequest) returns (HealthResponse);
}
